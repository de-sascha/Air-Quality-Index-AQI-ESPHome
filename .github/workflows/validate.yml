name: Validate

# Runs on every push to any branch and every pull request. Fast checks
# only (schema validation, YAML parsing, secret scanning) so contributors
# get feedback in under 3 minutes. The heavier full-compile job runs in
# a separate workflow (compile.yml).

on:
  push:
    branches: [ main, dev, "feat/**", "fix/**" ]
  pull_request:
    branches: [ main, dev ]

jobs:
  yaml-syntax:
    name: YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Parse YAML files
        run: |
          # Every *.yaml under the repo must be syntactically valid YAML.
          # We can't validate them against ESPHome's schema here (that
          # needs the full ESPHome install), but we can catch broken
          # indentation, unbalanced quotes, tab/space mixing etc. very
          # quickly.
          python3 <<'PY'
          import sys, yaml
          from pathlib import Path

          # Custom loader that ignores ESPHome-specific tags like !secret
          class Loader(yaml.SafeLoader): pass
          def _tag(loader, node):
              # Represent unknown tags as strings so parsing does not fail.
              if isinstance(node, yaml.ScalarNode):
                  return loader.construct_scalar(node)
              if isinstance(node, yaml.SequenceNode):
                  return loader.construct_sequence(node)
              if isinstance(node, yaml.MappingNode):
                  return loader.construct_mapping(node)
              return None
          Loader.add_multi_constructor("!", _tag)

          errors = 0
          for path in sorted(Path(".").rglob("*.yaml")):
              # Skip cache directories
              if any(p in str(path) for p in [".esphome", ".pio", "node_modules"]):
                  continue
              try:
                  with open(path) as f:
                      yaml.load(f, Loader=Loader)
                  print(f"✓ {path}")
              except yaml.YAMLError as e:
                  print(f"✗ {path}\n  {e}")
                  errors += 1
          sys.exit(errors)
          PY

  esphome-config:
    name: ESPHome config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The YAML references !secret values that live only in a
      # gitignored firmware/source/secrets.yaml on each builder's
      # machine. For CI we write a fake secrets file with dummy values
      # so the schema validator can resolve every reference. Nothing
      # here is a real key — the CI never talks to a real device.
      - name: Write CI dummy secrets.yaml
        run: |
          cat > firmware/source/secrets.yaml <<'EOF'
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci-dummy-ota-password"
          web_username: "ci"
          web_password: "ci-dummy-web-password"
          EOF

      - name: Validate with esphome/build-action
        uses: esphome/build-action@v7
        with:
          yaml-file: firmware/source/air-quality-monitor.yaml
          version: latest
          # 'config' verifies the config against the ESPHome schema
          # (component references, sensor IDs, GPIO pin availability
          # for the target board, etc.) without doing a full compile.
          # Runs in ~1 minute vs 10-15 for a full build.
          esphome-command: config

  # (No firmware-checksums job — the repo is source-only since v0.2.0.
  # Every builder compiles the firmware against their own secrets.yaml,
  # so there are no shipped binaries to check against SHA256SUMS.txt.)

  secret-scan:
    name: Secret / PII scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grep for suspicious substrings
        run: |
          set -e
          echo "Scanning committed files for likely-private substrings..."

          # Text-only files. Binary artifacts (fonts, PDFs, images)
          # would false-positive on random byte sequences.
          FILES=$(git ls-files | grep -viE '\.(bin|pdf|png|jpg|jpeg|gif|ico|ttf|woff2?)$')

          # Patterns that must not appear in any tracked text file:
          #   - private IPv4 ranges (except 192.168.4.1 which is the
          #     documented ESPHome AP fallback address)
          #   - API-key-shaped base64 tails
          #   - common home-Wi-Fi SSIDs and personal identifiers
          # Add new project-specific patterns here as they come up.

          FAIL=0
          check() {
            local pattern="$1"
            local label="$2"
            local matches
            matches=$(echo "$FILES" | xargs grep -nHE "$pattern" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Found $label:"
              echo "$matches"
              FAIL=1
            fi
          }

          # Private IPv4 ranges — 10.x.x.x and 172.16-31.x.x are always suspect;
          # 192.168.x.x is suspect except the well-known 192.168.4.1
          # (ESPHome AP fallback) and the default gateway families that
          # documentation examples legitimately use.
          check '\b10\.[0-9]+\.[0-9]+\.[0-9]+\b'         '10.x.x.x IP address'
          check '\b172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]+\.[0-9]+\b' '172.16-31.x.x IP address'

          # 192.168.x.x — allow 192.168.4.1 (ESPHome AP fallback default,
          # documented in README + wiring doc). Anything else fails.
          bad_192=$(echo "$FILES" | xargs grep -nHE '\b192\.168\.[0-9]+\.[0-9]+\b' 2>/dev/null | grep -vE '192\.168\.4\.1[^0-9]' | grep -vE '192\.168\.4\.1$' || true)
          if [ -n "$bad_192" ]; then
            echo "::error::Found 192.168.x.x IP other than the allowed 192.168.4.1:"
            echo "$bad_192"
            FAIL=1
          fi

          # Base64-shaped 44-char strings that end with '=' (typical API
          # encryption key length). Exclude glyph strings in font
          # declarations (they contain '=' but aren't secrets), and
          # exclude the dummy CI values used by validate.yml /
          # compile.yml themselves (all-A padding).
          bad_b64=$(echo "$FILES" | xargs grep -nHE '\b[A-Za-z0-9+/]{40}={1,2}\b' 2>/dev/null | grep -viE 'glyphs:|charmap|font_' | grep -viE '^\.github/workflows/' | grep -viE 'AAAAAAAAAAAA' || true)
          if [ -n "$bad_b64" ]; then
            echo "::error::Found likely base64 secret (44-char string ending with =):"
            echo "$bad_b64"
            FAIL=1
          fi

          # Any file that says 'secrets.yaml' outside of documentation
          # or gitignore is fine, but a file NAMED secrets.yaml must not
          # be committed.
          if git ls-files | grep -q '^secrets\.yaml$\|/secrets\.yaml$'; then
            echo "::error::secrets.yaml is committed — must be gitignored"
            FAIL=1
          fi

          if [ "$FAIL" -eq 0 ]; then
            echo "No secrets or private data found."
          else
            exit 1
          fi
