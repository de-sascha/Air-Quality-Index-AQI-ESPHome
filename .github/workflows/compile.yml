name: Full compile

# Full ESPHome compile — actually builds a firmware.factory.bin.
# Slow (~10-15 minutes) and pulls the ESP-IDF toolchain (~1 GB), so
# this only runs on pull requests targeting main and on the merge
# commit. Contributors get fast feedback from validate.yml first.

on:
  pull_request:
    branches: [ main ]
    paths:
      - "firmware/source/**"
      - ".github/workflows/compile.yml"
  push:
    branches: [ main ]
    paths:
      - "firmware/source/**"

# Only one full-compile at a time per branch — if a new commit lands
# while one is running, cancel the older one.
concurrency:
  group: compile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: esphome compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Cache the ESP-IDF toolchain and PlatformIO packages between
      # runs — cuts a fresh 15-minute build down to ~2-3 minutes.
      # Cache key includes the YAML hash so a config change that
      # requires new components invalidates the cache correctly.
      - name: Cache ESPHome build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.esphome
            firmware/source/.esphome
          key: esphome-${{ runner.os }}-${{ hashFiles('firmware/source/*.yaml') }}
          restore-keys: |
            esphome-${{ runner.os }}-

      # Same as validate.yml — write a dummy secrets.yaml so the
      # compile can resolve !secret references. The compiled binary
      # from CI has these dummy keys baked in and MUST NOT be flashed
      # to a real device; it exists only to prove the source compiles.
      - name: Write CI dummy secrets.yaml
        run: |
          cat > firmware/source/secrets.yaml <<'EOF'
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci-dummy-ota-password"
          web_username: "ci"
          web_password: "ci-dummy-web-password"
          EOF

      - name: Compile via esphome/build-action
        uses: esphome/build-action@v7
        with:
          yaml-file: firmware/source/air-quality-monitor.yaml
          version: latest
          esphome-command: compile

      # Note: since v0.2.0 the CI compiles with a DUMMY secrets.yaml
      # (see above). We deliberately do NOT upload the resulting
      # binaries as workflow artifacts — anyone who downloaded and
      # flashed such a binary would end up with public well-known
      # keys on their device. Contributors must compile locally
      # with their own secrets.yaml to get a usable image.
