# =====================================================================
# Air Quality Monitor — ESPHome source for Seeed XIAO ESP32-C6
# =====================================================================
# This is the canonical firmware source. It is a template — every
# builder compiles it with their own local `secrets.yaml` that holds
# their unique keys and passwords. Nothing sensitive lives in this
# file or in the repository.
#
# What each builder needs to do:
#
#   1. Install ESPHome (`pip install esphome`, see README).
#   2. Copy `secrets.yaml.example` to `secrets.yaml` and fill in
#      unique values (generator link in the template).
#   3. Compile + flash over USB the first time:
#         esphome run firmware/source/air-quality-monitor.yaml
#   4. On first boot the device opens the fallback Wi-Fi AP
#      `AirQuality` (password `12345678`). Join it, complete the
#      captive-portal onboarding to your home Wi-Fi.
#   5. In Home Assistant: add the device, paste the API encryption
#      key from your `secrets.yaml` when prompted.
#
# Security features enabled here (matching ESPHome's own recommendation
# in https://esphome.io/guides/security_best_practices):
#
#   - `api.encryption.key`   → !secret api_encryption_key
#   - `ota.password`         → !secret ota_password
#   - `web_server.auth`      → !secret web_username + !secret web_password
#
# The three secrets MUST be unique per device — do not copy them from
# another builder's setup.
#
# Hardware:
#   MCU:              Seeed Studio XIAO ESP32-C6
#   Display:          AZ-Delivery 1.3" OLED (SH1106 controller, I2C 0x3C)
#   CO2/Climate:      Sensirion SCD41 (I2C 0x62)
#   Particulate:      Plantower PMS5003 (UART, 5 V supply)
#
# Wiring (see docs/hardware for detail):
#   I2C:  SDA=GPIO22 (silkscreen D4), SCL=GPIO23 (silkscreen D5)
#   UART: TX=GPIO1  (silkscreen D1)  -> PMS5003 RX
#         RX=GPIO0  (silkscreen D0)  -> PMS5003 TX
#   PMS SET pin: GPIO21 (silkscreen D3)
# =====================================================================

esphome:
  name: air-quality-monitor
  friendly_name: Air Quality Monitor
  on_boot:
    # Three triggers:
    #   - priority 800: earliest hook. If `Web UI Auth Required` was
    #     switched OFF, blank the credentials on the web_server_base
    #     so its setup() (running at priority 700) never installs the
    #     auth middleware.
    #   - priority -10: informational log.
    #   - priority -100: late boot. Wait 10 s for all components
    #     (display, SCD41) to have completed their own setup() plus a
    #     couple of measurement cycles, THEN flip `boot_settled` and
    #     apply the persisted display + offset state. Without this
    #     delay, touching the SH1106 too early crashes the ESP with a
    #     Store access fault (observed as a boot loop).
    - priority: 800
      then:
        - lambda: |-
            // Read the persisted mirror (see `web_auth_persisted` global),
            // NOT `web_auth_required.state` — the template switch has not
            // yet restored its NVS state at this point in the boot sequence,
            // so its `.state` always reads as the type-default `false` here.
            // GitHub issue #1.
            if (!id(web_auth_persisted)) {
              id(web_srv_base)->set_auth_username("");
              id(web_srv_base)->set_auth_password("");
              ESP_LOGW("aq", "Web UI auth DISABLED via NVS switch — no login required");
            }
    - priority: -10
      then:
        - logger.log: "Air Quality Monitor booting..."
    - priority: -100
      then:
        - delay: 10s
        - lambda: 'id(boot_settled) = true;'
        - logger.log: "Boot settled — applying persisted display + offset"
        - script.execute: apply_display_settings
        - delay: 500ms
        - script.execute: apply_temperature_offset

# ---------------------------------------------------------------------
# Globals — persisted state read by the display + sensor scripts.
# ---------------------------------------------------------------------
globals:
  - id: night_active
    type: bool
    restore_value: no
    initial_value: 'false'

  # Guard for actions that must NOT fire during setup (e.g. the reboot
  # trigger of the `Web UI Auth Required` switch, and the display /
  # SCD41 touch code). ESPHome's template switches call turn_on()/
  # turn_off() on setup() to apply their restore_mode-derived state,
  # which triggers on_turn_on/on_turn_off — without this guard the
  # auth switch's reboot action would fire on every boot. Flips to
  # true 10 s into boot from the on_boot priority -100 handler.
  - id: boot_settled
    type: bool
    restore_value: no
    initial_value: 'false'

  # Persisted mirror of the `Web UI Auth Required` template switch.
  # ESPPreferences restores globals BEFORE any component setup() runs,
  # so this value is already correct at on_boot priority 800 — unlike
  # the template switch itself, which restores its state inside setup()
  # (scheduled after priority-800 on_boot). See GitHub issue #1 for the
  # boot-order race this works around. The initial_value must match
  # the switch's RESTORE_DEFAULT_ON so a device with clean NVS behaves
  # the same way for both the global and the switch.
  - id: web_auth_persisted
    type: bool
    restore_value: yes
    initial_value: 'true'

# ---------------------------------------------------------------------
# Scripts — re-usable action bundles
# ---------------------------------------------------------------------
# `apply_display_settings` is the single place that reads the user-facing
# display entities (brightness, rotation, power switch, night mode) and
# pushes them into the underlying display component. Called from
# on_boot, from the on_value handler of every display-related entity,
# and from the night-mode interval — so there is exactly one code path
# that touches display state and it stays consistent.
script:
  - id: apply_display_settings
    then:
      # Guard: only touch the OLED once boot is fully settled. See the
      # `boot_settled` global's comment for why.
      - if:
          condition:
            lambda: 'return id(boot_settled);'
          then:
            - lambda: |-
                // Contrast (SH1106 exposes a single 0..1 slider — treat as
                // brightness in the UI). Slider is 0..100 percent.
                float pct = id(display_brightness).state;
                if (pct < 0)   pct = 0;
                if (pct > 100) pct = 100;
                id(oled).set_contrast(pct / 100.0f);

                // Rotation — the select stores a plain "0" / "90" / "180" /
                // "270" string. Map to the display component's enum.
                std::string rot = id(display_rotation).state;
                DisplayRotation r = DISPLAY_ROTATION_0_DEGREES;
                if      (rot == "90")  r = DISPLAY_ROTATION_90_DEGREES;
                else if (rot == "180") r = DISPLAY_ROTATION_180_DEGREES;
                else if (rot == "270") r = DISPLAY_ROTATION_270_DEGREES;
                id(oled).set_rotation(r);

                // Power — off when user flipped the switch OR night mode is
                // currently active. Two independent gates, OR'd together.
                bool user_on = id(display_power).state;
                bool should_be_on = user_on && !id(night_active);
                if (should_be_on) {
                  id(oled).turn_on();
                } else {
                  id(oled).turn_off();
                }

                // Force a redraw so the change is visible immediately rather
                // than at the next 1 s tick.
                id(oled).update();

  # Push a new temperature offset into the SCD41's internal register.
  #
  # The Sensirion SCD4x command flow for `set_temperature_offset`
  # (0x241D) requires the sensor to be in IDLE state — writing while
  # periodic measurement is running is silently ignored. So the
  # sequence is:
  #   1. stop_periodic_measurement (0x3F86), wait 500 ms
  #   2. set_temperature_offset    (0x241D + u16 + CRC), wait 1 ms
  #   3. start_periodic_measurement(0x21B1)
  #
  # We deliberately do NOT call persist_settings (0x3615) here — that
  # writes the sensor's EEPROM (limited erase cycles, ~2000). The
  # button "Save Offset to Sensor EEPROM" (see button: block) is the
  # explicit save path. NVS on the ESP32 side already survives reboot,
  # so the offset is re-applied every boot regardless of EEPROM state.
  #
  # Encoding per datasheet: raw = offset_deg_c * 65536 / 175.
  # Range clamp 0..20 °C is enforced by the number entity above but we
  # re-clamp here defensively.
  - id: apply_temperature_offset
    then:
      # Guard: talking to the SCD41 before boot_settled crashes or
      # NACKs. Same reasoning as apply_display_settings.
      - if:
          condition:
            lambda: 'return id(boot_settled);'
          then:
            - lambda: |-
                float off = id(temperature_offset).state;
                if (off < 0)   off = 0;
                if (off > 10)  off = 10;
                uint16_t raw = (uint16_t)(off * 65536.0f / 175.0f);
                ESP_LOGI("scd41", "Applying temperature offset: %.1f °C (raw=0x%04X)", off, raw);
                // stop_periodic_measurement — required before any config write.
                // Casts to uint16_t are needed because the Sensirion helper's
                // template parameter must be an 8- or 16-bit type; a bare
                // hex literal is `int` and fails a static_assert.
                id(scd41)->write_command((uint16_t) 0x3F86);
            - delay: 500ms
            - lambda: |-
                float off = id(temperature_offset).state;
                if (off < 0)   off = 0;
                if (off > 10)  off = 10;
                uint16_t raw = (uint16_t)(off * 65536.0f / 175.0f);
                id(scd41)->write_command((uint16_t) 0x241D, raw);
            - delay: 10ms
            - lambda: |-
                // Resume periodic measurement so subsequent reads keep flowing
                id(scd41)->write_command((uint16_t) 0x21B1);

  # Explicit EEPROM save. Writes the CURRENT sensor state (including
  # the offset just applied) to the SCD41's non-volatile memory via
  # persist_settings (0x3615). Datasheet notes:
  #   - only permitted in idle state (we stop -> persist -> restart)
  #   - takes up to 800 ms, sensor must not be talked to during that
  #   - EEPROM endurance ~2000 cycles, so DO NOT call this on every
  #     slider change; the button gate is intentional.
  # This is exposed as its own action so it can be triggered from the
  # button below.
  - id: persist_scd41_settings
    then:
      - if:
          condition:
            lambda: 'return id(boot_settled);'
          then:
            - lambda: |-
                ESP_LOGI("scd41", "Persisting settings to EEPROM (~800 ms)");
                id(scd41)->write_command((uint16_t) 0x3F86);
            - delay: 500ms
            - lambda: 'id(scd41)->write_command((uint16_t) 0x3615);'
            - delay: 800ms
            - lambda: 'id(scd41)->write_command((uint16_t) 0x21B1);'

  # Re-usable night-window evaluator. Called from the 60 s interval
  # AND from every user-facing trigger that changes the window
  # (Night Mode Enabled switch, Night Mode Start / End datetimes) so
  # a Web-UI toggle takes effect immediately instead of waiting up to
  # a minute for the next tick.
  - id: reevaluate_night_mode
    then:
      - lambda: |-
          bool new_active = false;
          if (id(night_mode_enabled).state) {
            auto now = id(sntp_time).now();
            if (now.is_valid()) {
              auto s = id(night_start)->state_as_esptime();
              auto e = id(night_end)->state_as_esptime();
              int now_m   = now.hour * 60 + now.minute;
              int start_m = s.hour * 60 + s.minute;
              int end_m   = e.hour * 60 + e.minute;
              if (start_m == end_m) {
                new_active = false;
              } else if (start_m < end_m) {
                new_active = (now_m >= start_m && now_m < end_m);
              } else {
                new_active = (now_m >= start_m || now_m < end_m);
              }
            }
          }
          if (new_active != id(night_active)) {
            id(night_active) = new_active;
            ESP_LOGI("aq", "night mode: %s", new_active ? "ENTER" : "EXIT");
            id(apply_display_settings).execute();
          }

# ESP32-C6 requires the esp-idf framework
esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# ---------------------------------------------------------------------
# Core services
# ---------------------------------------------------------------------
logger:
  # Compile-time log-level ceiling. Setting this to VERBOSE keeps
  # ESP_LOGD/ESP_LOGV statements in the binary, so the DEBUG / VERBOSE
  # buttons below can actually raise the runtime level. If this were
  # left at the runtime default (INFO), those statements would be
  # optimised out and the buttons would emit "Cannot set log level
  # higher than pre-compiled INFO" warnings.
  level: VERBOSE
  # Runtime default at boot — keeps the log stream readable for daily
  # use. Buttons switch to DEBUG / VERBOSE on demand without a reboot.
  initial_level: INFO
  # Log to the native USB-CDC serial (built into the ESP32-C6) so the
  # hardware UART (GPIO 0/1) stays free for the PMS5003.
  hardware_uart: USB_SERIAL_JTAG

# Native API with per-device encryption.
# Every builder must supply a unique 32-byte base64 key in their local
# `secrets.yaml`. Generate one at https://esphome.io/components/api
# (the browser generates it locally, nothing leaves your machine).
# The same key goes into Home Assistant when it prompts during pairing.
api:
  encryption:
    key: !secret api_encryption_key

# OTA (Over-The-Air) updates. Password from local secrets.yaml so
# nobody on the LAN can push arbitrary firmware.
ota:
  - platform: esphome
    password: !secret ota_password

# Wi-Fi with no baked-in SSID / password.
# Freshly flashed devices come up with no client credentials, so they
# always start the AP `AirQuality` for onboarding. The user's Wi-Fi
# credentials get stored in NVS by the captive portal and persist across
# reboots.
wifi:
  ap:
    ssid: "AirQuality"
    password: "12345678"

captive_portal:

# improv_serial: the standard ESPHome provisioning protocol (also used
# by OpenDTU and other Espressif-based projects). Combined with the
# captive portal, the phone gets a Wi-Fi scan list + password prompt as
# soon as it connects to the fallback AP.
improv_serial:

# ---------------------------------------------------------------------
# Web server — the official ESPHome frontend
# ---------------------------------------------------------------------
# Serves a self-contained SPA on port 80 with:
#   - live values for every entity
#   - switches / selects / buttons the config exposes
#   - OTA upload form
#   - live log stream
#
# Version 3 is the current UI (Lit-based SPA + WebSocket + SSE).
# `local: true` bakes the assets into the flash so no external CDN is
# hit — the UI works even without internet access.
#
# Basic-auth credentials come from local secrets.yaml. Even on a
# trusted home network this stops a stray browser tab or a lab-mate
# from restarting the device or triggering factory reset.
# ---------------------------------------------------------------------
# Explicit web_server_base id so on_boot (priority 800) can reach it
# to blank credentials when the `Web UI Auth Required` switch is off.
web_server_base:
  id: web_srv_base

web_server:
  port: 80
  version: 3
  local: true
  auth:
    username: !secret web_username
    password: !secret web_password
  # Web-UI card groups. Every user-facing entity below carries a
  # matching web_server.sorting_group_id so the front page splits into
  # thematic boxes instead of one giant list. `sorting_weight` orders
  # the boxes vertically (lower = higher up).
  sorting_groups:
    - id: grp_sensor_scd41
      name: "Sensor (SCD41)"
      sorting_weight: 10
    - id: grp_sensor_pms5003
      name: "Sensor (PMS5003)"
      sorting_weight: 20
    - id: grp_display
      name: "Display"
      sorting_weight: 30
    - id: grp_system
      name: "System"
      sorting_weight: 40
    - id: grp_diag
      name: "Diagnostics"
      sorting_weight: 50

# ---------------------------------------------------------------------
# I2C bus — shared between the SH1106 OLED and the SCD41 CO2 sensor
# ---------------------------------------------------------------------
i2c:
  sda: GPIO22       # silkscreen D4 on the XIAO ESP32-C6
  scl: GPIO23       # silkscreen D5 on the XIAO ESP32-C6
  frequency: 400kHz
  scan: true        # logs all detected I2C addresses on boot
  id: bus_a

# ---------------------------------------------------------------------
# UART for the Plantower PMS5003
# ---------------------------------------------------------------------
# Silkscreen "D0" on the XIAO ESP32-C6 maps to GPIO0, not GPIO2 as some
# older references suggest. An earlier revision used GPIO2 and received
# zero bytes from the sensor.
uart:
  id: uart_pms
  tx_pin: GPIO1     # silkscreen D1 -> PMS5003 RX
  rx_pin: GPIO0     # silkscreen D0 <- PMS5003 TX
  baud_rate: 9600
  rx_buffer_size: 512

# ---------------------------------------------------------------------
# PMS5003 SET pin — sleep / wake control
#   HIGH = active (fan running, measurements streamed)
#   LOW  = sleep  (fan off, low power)
# Wire the PMS5003 adapter's SET pin to XIAO D3 (GPIO21).
# ---------------------------------------------------------------------
output:
  - platform: gpio
    pin: GPIO21     # silkscreen D3
    id: pms_set_pin

switch:
  - platform: output
    name: "PMS5003 Active"
    web_server:
      sorting_group_id: grp_sensor_pms5003
      sorting_weight: 40
    id: pms_active
    output: pms_set_pin
    restore_mode: ALWAYS_ON

  # Master on/off for the OLED. When off, the display component is
  # turn_off()'d (panel driver disabled, ~5 mA saved) rather than
  # blanked in software — this also prevents burn-in on the SH1106.
  # Restored across reboots so a user who wants a headless device
  # doesn't have to click again after every power cycle.
  - platform: template
    name: "Display Power"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 30
    id: display_power
    icon: mdi:monitor
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: apply_display_settings
    on_turn_off:
      - script.execute: apply_display_settings

  # Master switch for the nightly display blank. When off, the two
  # datetime entities have no effect and the display stays on 24/7.
  # Both on_turn_on and on_turn_off call reevaluate_night_mode so a
  # Web-UI toggle takes effect immediately, not after up to 60 s.
  - platform: template
    name: "Night Mode Enabled"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 40
    id: night_mode_enabled
    icon: mdi:weather-night
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: reevaluate_night_mode
    on_turn_off:
      - script.execute: reevaluate_night_mode

  # Toggles whether http://<device>/ requires basic-auth on the next
  # boot. Persists in NVS. The switch flip triggers a 3 s countdown +
  # automatic reboot so the effect is visible without a manual restart.
  # NOTE: The credentials themselves still live in `secrets.yaml` —
  # this switch only decides whether the AuthMiddleware is installed
  # at all. Turning auth back on brings the same web_username /
  # web_password back into force.
  #
  # The boot_settled guard is essential: ESPHome's template switches
  # call turn_on()/turn_off() during setup() to apply the restore_mode
  # state, which would trigger on_turn_on/on_turn_off and fire the
  # reboot action → infinite reboot loop.
  - platform: template
    name: "Web UI Auth Required"
    web_server:
      sorting_group_id: grp_system
      sorting_weight: 40
    id: web_auth_required
    icon: mdi:lock
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      - lambda: 'id(web_auth_persisted) = false;'
      - if:
          condition:
            lambda: 'return id(boot_settled);'
          then:
            - logger.log:
                format: "Web UI auth will be DISABLED after reboot"
                level: WARN
            - delay: 3s
            - lambda: 'App.safe_reboot();'
    on_turn_on:
      - lambda: 'id(web_auth_persisted) = true;'
      - if:
          condition:
            lambda: 'return id(boot_settled);'
          then:
            - logger.log: "Web UI auth will be ENABLED after reboot"
            - delay: 3s
            - lambda: 'App.safe_reboot();'

# ---------------------------------------------------------------------
# Buttons — appear as clickable cards in both Web UI and Home Assistant.
# Standard ESPHome `button:` platform; each button becomes a HA
# `button.*` entity that runs the on_press action.
# ---------------------------------------------------------------------
button:
  - platform: restart
    name: "Restart"
    web_server:
      sorting_group_id: grp_system
      sorting_weight: 10
    id: btn_restart
    icon: mdi:restart

  - platform: safe_mode
    name: "Restart (Safe Mode)"
    web_server:
      sorting_group_id: grp_system
      sorting_weight: 20
    id: btn_safe_mode
    icon: mdi:shield-alert

  - platform: template
    name: "WiFi Reconnect"
    web_server:
      sorting_group_id: grp_system
      sorting_weight: 30
    id: btn_wifi_reconnect
    icon: mdi:wifi-refresh
    on_press:
      - logger.log: "WiFi reconnect requested via button"
      - delay: 500ms
      - lambda: 'App.reboot();'

  - platform: template
    name: "Display Refresh"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 70
    id: btn_display_refresh
    icon: mdi:monitor-eye
    on_press:
      - component.update: oled

  - platform: template
    name: "PMS5003 Restart"
    web_server:
      sorting_group_id: grp_sensor_pms5003
      sorting_weight: 50
    id: btn_pms_restart
    icon: mdi:fan-off
    on_press:
      - switch.turn_off: pms_active
      - delay: 5s
      - switch.turn_on: pms_active

  - platform: template
    name: "Log INFO (Default)"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 120
    id: btn_log_info
    icon: mdi:information-outline
    on_press:
      - logger.set_level: INFO
      - logger.log: "Log level: INFO (default)"

  - platform: template
    name: "Log DEBUG On"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 130
    id: btn_log_debug
    icon: mdi:bug
    on_press:
      - logger.set_level: DEBUG
      - logger.log: "Log level: DEBUG (verbose)"

  - platform: template
    name: "Log VERBOSE On"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 140
    id: btn_log_verbose
    icon: mdi:bug-check
    on_press:
      - logger.set_level: VERBOSE
      - logger.log: "Log level: VERBOSE (all messages)"

  # Factory reset — wipes stored Wi-Fi credentials + persistent state,
  # then reboots. Comes back in the as-shipped state (AP `AirQuality`).
  - platform: factory_reset
    name: "Factory Reset"
    web_server:
      sorting_group_id: grp_system
      sorting_weight: 50
    id: btn_factory_reset
    icon: mdi:restore-alert

  # Push the current `Temperature Offset` value into the SCD41's
  # non-volatile EEPROM. Two-step operation: first re-applies the
  # slider value so the sensor's live register is in sync, then
  # persists. Only click when you're sure — the SCD41 EEPROM has
  # ~2000 write cycles.
  - platform: template
    name: "Save Offset to Sensor EEPROM"
    web_server:
      sorting_group_id: grp_sensor_scd41
      sorting_weight: 50
    id: btn_persist_scd41
    icon: mdi:content-save-cog
    on_press:
      - script.execute: apply_temperature_offset
      - delay: 1s
      - script.execute: persist_scd41_settings

  # Restore the Sensirion factory calibration: sets the offset back to
  # 4.0 °C (the shipped default) both in our NVS-persisted number
  # entity and in the SCD41's EEPROM. After pressing this, the sensor
  # is indistinguishable from a freshly unboxed part with respect to
  # temperature calibration. Uses the same EEPROM write as the save
  # button above — same ~2000 cycle budget applies.
  - platform: template
    name: "Reset Offset to Factory (4 °C)"
    web_server:
      sorting_group_id: grp_sensor_scd41
      sorting_weight: 60
    id: btn_reset_scd41_offset
    icon: mdi:factory
    on_press:
      - logger.log: "Resetting SCD41 temperature offset to factory default (4.0 °C)"
      - number.set:
          id: temperature_offset
          value: 4.0
      # Give the number entity a beat to publish its new state before
      # the apply script reads it back.
      - delay: 500ms
      - script.execute: apply_temperature_offset
      - delay: 1s
      - script.execute: persist_scd41_settings

# ---------------------------------------------------------------------
# Number entities — user-tunable analog settings
# ---------------------------------------------------------------------
# Brightness maps 0..100 % → the SH1106's single 0..1 contrast register.
# The chip has no separate brightness/contrast pair; the datasheet
# register is labelled "contrast" but on a mono OLED it behaves as a
# global luminance control, which is why we surface it as
# "Brightness" to the user.
number:
  - platform: template
    name: "Display Brightness"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 10
    id: display_brightness
    icon: mdi:brightness-6
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    mode: slider
    on_value:
      - script.execute: apply_display_settings

  # SCD41 hardware temperature offset. The SCD41 samples the enclosure,
  # not the room, so its `Temperature` reading trends 2–6 °C above the
  # real air temperature depending on enclosure design and self-heating.
  # This slider writes the offset directly into the sensor's internal
  # register: `reported = raw − offset`, so INCREASE the offset when
  # the displayed value is TOO HIGH.
  #
  # Sensirion factory default is 4.0 °C. Range 0..20 °C in 0.1° steps
  # gives room for extreme enclosures without letting a slip enable
  # nonsense values. Volatile-only by default (survives `restart` of
  # measurement, not a power cycle) — use the "Save Offset to Sensor
  # EEPROM" button below to make it permanent inside the sensor. The
  # ESP32 side always re-applies the NVS-persisted value on boot, so
  # even without an EEPROM save the setting survives reboots.
  - platform: template
    name: "Temperature Offset"
    web_server:
      sorting_group_id: grp_sensor_scd41
      sorting_weight: 40
    id: temperature_offset
    icon: mdi:thermometer-minus
    unit_of_measurement: "°C"
    min_value: 0
    max_value: 20
    step: 0.1
    initial_value: 4.0
    optimistic: true
    restore_value: true
    mode: box
    on_value:
      - script.execute: apply_temperature_offset

# ---------------------------------------------------------------------
# Datetime entities — night-mode window
# ---------------------------------------------------------------------
# HA presents these as two time pickers. Default window is 22:00 → 07:00.
# Values persist across reboots. Wraparound (start > end) is treated as
# "overnight" — the standard case for a night mode.
datetime:
  - platform: template
    name: "Night Mode Start"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 50
    id: night_start
    type: time
    icon: mdi:weather-sunset-down
    optimistic: true
    restore_value: true
    initial_value: "22:00:00"
    on_value:
      - script.execute: reevaluate_night_mode

  - platform: template
    name: "Night Mode End"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 60
    id: night_end
    type: time
    icon: mdi:weather-sunset-up
    optimistic: true
    restore_value: true
    initial_value: "07:00:00"
    on_value:
      - script.execute: reevaluate_night_mode

# ---------------------------------------------------------------------
# Language selector
# ---------------------------------------------------------------------
# Single switch that drives BOTH the display texts and the values of the
# state text_sensors (verdict, action, dust action, boot reason).
# Entity NAMES stay English so Home Assistant entity_ids don't change
# when the language flips — only the VALUES do.
#
# `restore_value: true` persists the choice in NVS across reboots and
# OTA. Factory reset restores the initial option (English).
# ---------------------------------------------------------------------
select:
  - platform: template
    name: "Language"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 80
    id: ui_language
    icon: mdi:translate
    optimistic: true
    restore_value: true
    initial_option: "English"
    options:
      - "English"
      - "Deutsch"
    # Force a redraw + refresh of all language-dependent text sensors
    # the instant the user flips the switch, instead of waiting for the
    # next scheduled update.
    on_value:
      - component.update: verdict_text
      - component.update: verdict_action
      - component.update: dust_action
      - component.update: sys_boot_reason
      - component.update: sys_uptime_human
      - component.update: oled

  # Display rotation, in 90-degree steps. Lets the user mount the OLED
  # in any orientation in a 3D-printed enclosure without opening the
  # firmware. The option strings are plain integers so the apply script
  # can parse them directly; the icon hints at the "rotate" action.
  - platform: template
    name: "Display Rotation"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 20
    id: display_rotation
    icon: mdi:screen-rotation
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      - script.execute: apply_display_settings

# ---------------------------------------------------------------------
# Text sensors — Wi-Fi info + AQI verdicts
# ---------------------------------------------------------------------
# Anywhere a lambda picks a language-specific string, it uses:
#   id(ui_language).state == "Deutsch"
# German is the alternate; English is the default and the fallback for
# any state where the select has no value yet (should not happen with
# initial_option set, but defensive).
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: sys_ip
    ssid:
      name: "SSID"
      id: sys_ssid
    mac_address:
      name: "MAC"
      id: sys_mac

  # AQI traffic light: one-word overall verdict.
  # Follows the Language select — English by default, Deutsch when
  # the user flips the switch. Wording matches the AQI thresholds table
  # in README.md (TOP / GOOD / FAIR / POOR / CRITICAL, WHO-style).
  - platform: template
    name: "Air Quality Verdict"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 90
    id: verdict_text
    update_interval: 30s
    lambda: |-
      if (!id(aqi_overall).has_state()) return {"..."};
      int s = (int)id(aqi_overall).state;
      bool de = id(ui_language).state == "Deutsch";
      switch(s) {
        case 0: return de ? std::string("TOP")      : std::string("TOP");
        case 1: return de ? std::string("GUT")      : std::string("GOOD");
        case 2: return de ? std::string("MITTEL")   : std::string("FAIR");
        case 3: return de ? std::string("SCHLECHT") : std::string("POOR");
        case 4: return de ? std::string("KRITISCH") : std::string("CRITICAL");
      }
      return {"?"};

  # Actionable recommendation for the traffic-light page.
  # Priority: PM (health-relevant) > CO2 > humidity. Temperature is
  # deliberately excluded because the SCD41 warms itself up inside the
  # enclosure by a few degrees, so any threshold would trigger false
  # alarms.
  - platform: template
    name: "Air Quality Action"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 100
    id: verdict_action
    update_interval: 30s
    lambda: |-
      if (!id(aqi_overall).has_state()) return {"..."};
      int overall = (int)id(aqi_overall).state;
      bool de = id(ui_language).state == "Deutsch";
      if (overall == 0) return de ? std::string("alles gut") : std::string("all good");

      int co2  = id(aqi_co2).has_state()  ? (int)id(aqi_co2).state  : -1;
      int pm25 = id(aqi_pm25).has_state() ? (int)id(aqi_pm25).state : -1;
      int pm10 = id(aqi_pm10).has_state() ? (int)id(aqi_pm10).state : -1;
      int h    = id(aqi_hum).has_state()  ? (int)id(aqi_hum).state  : -1;

      // PM2.5 first — smallest particles, most harmful.
      if (pm25 >= overall) {
        if (pm25 >= 4) return de ? std::string("Reiniger MAX!")    : std::string("Purifier MAX!");
        if (pm25 >= 3) return de ? std::string("Luftreiniger an!") : std::string("Purifier on!");
        return           de ? std::string("Feinstaub erhoeht")     : std::string("Fine dust up");
      }
      if (pm10 >= overall) {
        if (pm10 >= 3) return de ? std::string("Grobstaub, lueften") : std::string("Coarse dust, vent");
        return           de ? std::string("Grobstaub leicht")        : std::string("Coarse dust mild");
      }
      if (co2 >= overall) {
        if (co2 >= 3) return de ? std::string("Fenster auf!")      : std::string("Open window!");
        return           de ? std::string("lueften waere gut")     : std::string("venting advised");
      }
      if (h >= overall) {
        float hv = id(sens_humidity).state;
        if (hv > 60) return de ? std::string("zu feucht, lueften") : std::string("too humid, vent");
        return           de ? std::string("zu trocken")            : std::string("too dry");
      }
      return {"..."};

  # Fine-dust specific recommendation for the dust detail page.
  - platform: template
    name: "Dust Action"
    web_server:
      sorting_group_id: grp_sensor_pms5003
      sorting_weight: 80
    id: dust_action
    update_interval: 60s
    lambda: |-
      int pm25 = id(aqi_pm25).has_state() ? (int)id(aqi_pm25).state : -1;
      int pm10 = id(aqi_pm10).has_state() ? (int)id(aqi_pm10).state : -1;
      if (pm25 < 0 && pm10 < 0) return {"..."};
      bool de = id(ui_language).state == "Deutsch";

      if (pm25 >= pm10) {
        if (pm25 >= 4) return de ? std::string("Reiniger MAX, zu!") : std::string("Purifier MAX, shut!");
        if (pm25 >= 3) return de ? std::string("Luftreiniger an!")  : std::string("Purifier on!");
        if (pm25 >= 2) return de ? std::string("Quelle? (Kochen?)") : std::string("Source? (cooking?)");
        if (pm25 >= 1) return de ? std::string("leicht erhoeht")    : std::string("slightly elevated");
        return           de ? std::string("alles sauber")           : std::string("all clean");
      }
      if (pm10 >= 4) return de ? std::string("stark staubig!")      : std::string("very dusty!");
      if (pm10 >= 3) return de ? std::string("Grobstaub, lueften")  : std::string("coarse dust, vent");
      if (pm10 >= 2) return de ? std::string("leicht staubig")      : std::string("slightly dusty");
      if (pm10 >= 1) return de ? std::string("minimal staubig")     : std::string("mildly dusty");
      return           de ? std::string("staubfrei")                : std::string("dust-free");

  - platform: template
    name: "Uptime (human)"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 60
    id: sys_uptime_human
    icon: mdi:clock-outline
    update_interval: 60s
    lambda: |-
      uint32_t total = id(sys_uptime).state;
      int days = total / 86400;
      int hours = (total % 86400) / 3600;
      int mins = (total % 3600) / 60;
      // Units d/h/m are internationally read the same in both languages —
      // no translation needed. Keep in sync with the display renderer.
      char buf[32];
      if (days > 0) {
        snprintf(buf, sizeof(buf), "%dd %dh %dm", days, hours, mins);
      } else if (hours > 0) {
        snprintf(buf, sizeof(buf), "%dh %dm", hours, mins);
      } else {
        snprintf(buf, sizeof(buf), "%dm", mins);
      }
      return {std::string(buf)};

  - platform: version
    name: "ESPHome Version"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 70
    id: sys_esphome_version
    icon: mdi:tag

  - platform: template
    name: "Boot Reason"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 80
    id: sys_boot_reason
    icon: mdi:restart
    update_interval: 3600s
    lambda: |-
      esp_reset_reason_t r = esp_reset_reason();
      bool de = id(ui_language).state == "Deutsch";
      switch (r) {
        case ESP_RST_POWERON:   return de ? std::string("Einschalten")        : std::string("Power-On");
        case ESP_RST_SW:        return de ? std::string("Software")           : std::string("Software");
        case ESP_RST_PANIC:     return de ? std::string("Ausnahme/Panik")     : std::string("Panic/Exception");
        case ESP_RST_INT_WDT:   return de ? std::string("Interrupt-Watchdog") : std::string("Interrupt Watchdog");
        case ESP_RST_TASK_WDT:  return de ? std::string("Task-Watchdog")      : std::string("Task Watchdog");
        case ESP_RST_WDT:       return de ? std::string("Watchdog")           : std::string("Watchdog");
        case ESP_RST_DEEPSLEEP: return de ? std::string("Deep-Sleep-Wake")    : std::string("Deep-Sleep Wake");
        case ESP_RST_BROWNOUT:  return de ? std::string("Brownout")           : std::string("Brownout");
        case ESP_RST_SDIO:      return de ? std::string("SDIO")               : std::string("SDIO");
        case ESP_RST_USB:       return de ? std::string("USB-Reset")          : std::string("USB Reset");
        default:                return de ? std::string("Unbekannt")          : std::string("Unknown");
      }

# ---------------------------------------------------------------------
# Fonts for the SH1106 OLED (128 x 64 monochrome)
# ---------------------------------------------------------------------
font:
  - file: "gfonts://Roboto"
    id: font_label
    size: 10
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ °µ³"
  - file: "gfonts://Roboto"
    id: font_mono
    size: 10
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ "
  - file: "gfonts://Roboto"
    id: font_value
    size: 16
    glyphs: "!\"%()+,-.0123456789:<>=?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_abcdefghijklmnopqrstuvwxyz{|}~ °"
  - file:
      type: gfonts
      family: Roboto
      weight: 700
    id: font_header
    size: 11
  - file:
      type: gfonts
      family: Roboto
      weight: 700
    id: font_verdict
    size: 14
    glyphs: "!\"()+,-.0123456789:;=?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_abcdefghijklmnopqrstuvwxyz{|}~ "
  - file: "gfonts://Roboto"
    id: font_action
    size: 9
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ "

  # Silkscreen — bitmap pixel font, used ONLY on the setup page.
  # Native size 8 renders as crisp 1:1 pixel art on the mono OLED,
  # which reads much better than antialiased Roboto for short
  # onboarding text. Kept separate from the Roboto family so the
  # data pages (which need µ, ³, °) are unaffected. Note: Silkscreen
  # has no lowercase glyphs — lowercase letters render as small caps.
  - file: "gfonts://Silkscreen"
    id: font_setup_txt
    size: 8
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ "

# ---------------------------------------------------------------------
# Time source
# ---------------------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"

# ---------------------------------------------------------------------
# Wi-Fi setup QR code
# ---------------------------------------------------------------------
# Encoded per the Wi-Fi Alliance's WPA-QR standard, which is understood
# natively by the iOS and Android camera apps:
#   WIFI:T:WPA;S:<ssid>;P:<password>;;
#
# When the customer points their phone camera at the display while the
# fallback AP is up, the phone offers a one-tap "Join AirQuality"
# prompt. No manual typing of SSID or password.
#
# The QR data is fixed at compile time (matches the SSID/password of
# the `wifi.ap` block above), so this costs no runtime RAM for encoding.
# Version-3 QR (29x29 modules) rendered at 2px per module = 58x58 px,
# which fits the left half of the 128x64 display and stays scannable
# from typical phone-camera distance.
# ---------------------------------------------------------------------
qr_code:
  - id: qr_wifi
    value: "WIFI:T:WPA;S:AirQuality;P:12345678;;"

# ---------------------------------------------------------------------
# Sensors
# ---------------------------------------------------------------------
sensor:
  # System diagnostics — visible as cards in Web UI and Home Assistant.
  - platform: wifi_signal
    name: "WiFi RSSI"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 40
    id: sys_rssi
    update_interval: 30s
  - platform: uptime
    name: "Uptime"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 50
    id: sys_uptime
    update_interval: 30s

  - platform: internal_temperature
    name: "CPU Temperature"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 90
    id: sys_cpu_temp
    update_interval: 60s

  - platform: template
    name: "Free Heap"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 100
    id: sys_free_heap
    unit_of_measurement: "B"
    accuracy_decimals: 0
    lambda: 'return esp_get_free_heap_size();'
    update_interval: 60s
    icon: mdi:memory

  - platform: template
    name: "Max Heap Block"
    web_server:
      sorting_group_id: grp_diag
      sorting_weight: 110
    id: sys_max_heap_block
    unit_of_measurement: "B"
    accuracy_decimals: 0
    lambda: 'return heap_caps_get_largest_free_block(MALLOC_CAP_DEFAULT);'
    update_interval: 60s
    icon: mdi:memory

  # Sensirion SCD4x (SCD40 / SCD41) — CO2, temperature, humidity.
  # I2C address 0x62, non-changeable.
  # `id: scd41` gives us a handle to the underlying SCD4XComponent so
  # the `Temperature Offset` number entity below can push a new offset
  # value into the sensor's internal register via write_command().
  - platform: scd4x
    id: scd41
    address: 0x62
    i2c_id: bus_a
    update_interval: 30s
    measurement_mode: periodic
    # Factory default is 4.0 °C. Our `temperature_offset` number entity
    # overrides this at runtime; the value here only matters for the
    # first boot before NVS has a saved user value.
    temperature_offset: 4.0 °C
    co2:
      name: "CO2"
      web_server:
        sorting_group_id: grp_sensor_scd41
        sorting_weight: 10
      id: sens_co2
    temperature:
      # "Room Temperature" — the SCD41 applies the offset (Temperature
      # Offset entity below) internally, so this is already the
      # user-relevant, corrected room temperature.
      name: "Room Temperature"
      web_server:
        sorting_group_id: grp_sensor_scd41
        sorting_weight: 20
      id: sens_temperature
    humidity:
      name: "Humidity"
      web_server:
        sorting_group_id: grp_sensor_scd41
        sorting_weight: 30
      id: sens_humidity

  # Plantower PMS5003 particulate matter sensor.
  # Runs continuously while `pms_active` is on. First stable frame
  # takes about 30 s after power-on / wake; ESPHome will log a few
  # frame-sync warnings during that window — expected.
  - platform: pmsx003
    type: PMSX003
    uart_id: uart_pms
    update_interval: 60s
    pm_1_0:
      name: "PM 1.0"
      web_server:
        sorting_group_id: grp_sensor_pms5003
        sorting_weight: 10
      id: sens_pm_1_0
    pm_2_5:
      name: "PM 2.5"
      web_server:
        sorting_group_id: grp_sensor_pms5003
        sorting_weight: 20
      id: sens_pm_2_5
    pm_10_0:
      name: "PM 10.0"
      web_server:
        sorting_group_id: grp_sensor_pms5003
        sorting_weight: 30
      id: sens_pm_10_0

  # AQI category scores (0..4, one per pollutant).
  # 0 = excellent, 1 = good, 2 = moderate, 3 = poor, 4 = critical.
  #
  # Thresholds:
  #   CO2 (Pettenkofer / WHO): <800 / <1000 / <1400 / <2000 / else
  #   PM2.5 (WHO 2021 24 h):    <10 / <15 / <25 / <37 / else
  #   PM10  (WHO 2021 24 h):    <20 / <45 / <75 / <150 / else
  #   Hum (comfort + mould):    40-60 / 30-65 / 25-70 / 20-75 / else
  #
  # Temperature is intentionally NOT scored — the SCD41 sits inside
  # the enclosure and self-heats by a few degrees, so a temperature
  # traffic light would be misleading.
  - platform: template
    name: "AQI CO2 Score"
    web_server:
      sorting_group_id: grp_sensor_scd41
      sorting_weight: 70
    id: aqi_co2
    update_interval: 30s
    lambda: |-
      if (!id(sens_co2).has_state()) return {};
      float v = id(sens_co2).state;
      if (v < 800)  return 0;
      if (v < 1000) return 1;
      if (v < 1400) return 2;
      if (v < 2000) return 3;
      return 4;

  - platform: template
    name: "AQI PM2.5 Score"
    web_server:
      sorting_group_id: grp_sensor_pms5003
      sorting_weight: 60
    id: aqi_pm25
    update_interval: 60s
    lambda: |-
      if (!id(sens_pm_2_5).has_state()) return {};
      float v = id(sens_pm_2_5).state;
      if (v < 10) return 0;
      if (v < 15) return 1;
      if (v < 25) return 2;
      if (v < 37) return 3;
      return 4;

  - platform: template
    name: "AQI PM10 Score"
    web_server:
      sorting_group_id: grp_sensor_pms5003
      sorting_weight: 70
    id: aqi_pm10
    update_interval: 60s
    lambda: |-
      if (!id(sens_pm_10_0).has_state()) return {};
      float v = id(sens_pm_10_0).state;
      if (v < 20)  return 0;
      if (v < 45)  return 1;
      if (v < 75)  return 2;
      if (v < 150) return 3;
      return 4;

  - platform: template
    name: "AQI Humidity Score"
    web_server:
      sorting_group_id: grp_sensor_scd41
      sorting_weight: 80
    id: aqi_hum
    update_interval: 30s
    lambda: |-
      if (!id(sens_humidity).has_state()) return {};
      float v = id(sens_humidity).state;
      if (v >= 40 && v <= 60) return 0;
      if (v >= 30 && v <= 65) return 1;
      if (v >= 25 && v <= 70) return 2;
      if (v >= 20 && v <= 75) return 3;
      return 4;

  # Overall score = worst-of-all category scores.
  - platform: template
    name: "AQI Overall Score"
    web_server:
      sorting_group_id: grp_display
      sorting_weight: 110
    id: aqi_overall
    update_interval: 30s
    lambda: |-
      float scores[] = {
        id(aqi_co2).has_state() ? id(aqi_co2).state : -1.0f,
        id(aqi_pm25).has_state() ? id(aqi_pm25).state : -1.0f,
        id(aqi_pm10).has_state() ? id(aqi_pm10).state : -1.0f,
        id(aqi_hum).has_state() ? id(aqi_hum).state : -1.0f,
      };
      float worst = 0;
      bool any = false;
      for (float s : scores) {
        if (s >= 0) { any = true; if (s > worst) worst = s; }
      }
      if (!any) return {};
      return worst;

# ---------------------------------------------------------------------
# Display — 1.3" OLED, SH1106 controller, 128 x 64 monochrome
# ---------------------------------------------------------------------
# ESPHome exposes SH1106 support through the ssd1306_i2c platform.
# Selecting `model: "SH1106 128x64"` switches the driver accordingly.
# Do NOT use the plain ssd1306 model with an SH1106 panel — the image
# ends up shifted by 2 pixels and the first/last column is garbled.
display:
  - platform: ssd1306_i2c
    id: oled
    model: "SH1106 128x64"
    address: 0x3C
    i2c_id: bus_a
    update_interval: 1s
    pages:

      # Setup page — shown ONLY while the device is not connected to a
      # client Wi-Fi. Contains a scannable WPA-QR for the fallback AP
      # plus the plaintext credentials as fallback for anyone whose
      # phone camera doesn't do QR.
      #
      # Uses the Silkscreen bitmap font (8 px, uniform) because on the
      # mono OLED a proper pixel font stays crisp where a scaled
      # TrueType face gets muddy. Silkscreen has no lowercase glyphs,
      # so labels are kept short and uppercase (SSID / PW) to look
      # intentional rather than shouted.
      #
      # Layout: 128 x 64 px, no header line. QR at (0, 3), 58x58.
      # Right column at x=64 shows SSID and PW label/value pairs.
      # "scan QR" hint sits below the QR at the bottom edge, centered
      # under the left half so it visually points at the QR.
      - id: page_setup
        lambda: |-
          // QR left, 58x58 px at scale=2 (v3 QR, 29 modules).
          it.qr_code(0, 0, id(qr_wifi), COLOR_ON, 2);

          // Right column, x=64. Silkscreen 8, uniform size.
          it.printf(64,  4, id(font_setup_txt), "SSID:");
          it.printf(64, 16, id(font_setup_txt), "AirQuality");

          // "scan QR" hint in the free strip between the SSID and PW
          // blocks, aligned to the right column. Sits next to the QR
          // horizontally so it visually links to it.
          it.printf(64, 28, id(font_setup_txt), "scan QR");

          it.printf(64, 40, id(font_setup_txt), "PW:");
          it.printf(64, 52, id(font_setup_txt), "12345678");

      # Page 1: overall verdict — the most important page.
      - id: page_overall
        lambda: |-
          bool de = id(ui_language).state == "Deutsch";
          it.printf(0, 0, id(font_header), "%s",
                    de ? "LUFTQUALITAET" : "AIR QUALITY");
          it.line(0, 13, 127, 13);

          int s = id(aqi_overall).has_state() ? (int)id(aqi_overall).state : -1;

          const char* verdict = "...";
          if (id(verdict_text).has_state()) verdict = id(verdict_text).state.c_str();

          if (s >= 2) {
            int fill_h = 16 + (s - 2) * 2;
            it.filled_rectangle(0, 18, 128, fill_h);
            it.printf(64, 20, id(font_verdict), COLOR_OFF, TextAlign::TOP_CENTER,
                      "%s", verdict);
          } else {
            it.printf(64, 20, id(font_verdict), TextAlign::TOP_CENTER,
                      "%s", verdict);
          }

          for (int i = 0; i < 5; i++) {
            int x = 6 + i * 24;
            if (i <= s) {
              it.filled_rectangle(x, 42, 20, 4);
            } else {
              it.rectangle(x, 42, 20, 4);
            }
          }

          if (id(verdict_action).has_state()) {
            it.printf(64, 52, id(font_action), TextAlign::TOP_CENTER,
                      "%s", id(verdict_action).state.c_str());
          }

      # Page 2: climate detail — CO2, temperature, humidity.
      - id: page_climate
        lambda: |-
          bool de = id(ui_language).state == "Deutsch";
          it.printf(0, 0, id(font_header), "%s", de ? "Klima" : "Climate");
          it.line(0, 13, 127, 13);

          auto label = [](int s) -> const char* {
            switch(s) {
              case 0: return "OK";
              case 1: return "OK";
              case 2: return "!";
              case 3: return "!!";
              case 4: return "!!!";
              default: return "";
            }
          };

          it.printf(0, 17, id(font_label), "CO2");
          if (id(sens_co2).has_state()) {
            it.printf(74, 15, id(font_value), TextAlign::TOP_RIGHT,
                      "%.0f", id(sens_co2).state);
            it.printf(77, 19, id(font_label), "ppm");
            if (id(aqi_co2).has_state()) {
              it.printf(127, 19, id(font_label), TextAlign::TOP_RIGHT,
                        "%s", label((int)id(aqi_co2).state));
            }
          } else {
            it.printf(74, 15, id(font_value), TextAlign::TOP_RIGHT, "--");
          }

          it.printf(0, 33, id(font_label), "Temp");
          if (id(sens_temperature).has_state()) {
            it.printf(74, 31, id(font_value), TextAlign::TOP_RIGHT,
                      "%.1f", id(sens_temperature).state);
            it.printf(77, 35, id(font_label), "\xC2\xB0""C");
          } else {
            it.printf(74, 31, id(font_value), TextAlign::TOP_RIGHT, "--");
          }

          it.printf(0, 49, id(font_label), "Hum");
          if (id(sens_humidity).has_state()) {
            it.printf(74, 47, id(font_value), TextAlign::TOP_RIGHT,
                      "%.0f", id(sens_humidity).state);
            it.printf(77, 51, id(font_label), "%%");
            if (id(aqi_hum).has_state()) {
              it.printf(127, 51, id(font_label), TextAlign::TOP_RIGHT,
                        "%s", label((int)id(aqi_hum).state));
            }
          } else {
            it.printf(74, 47, id(font_value), TextAlign::TOP_RIGHT, "--");
          }

      # Page 3: particulate matter detail.
      - id: page_pm
        lambda: |-
          bool de = id(ui_language).state == "Deutsch";
          it.printf(0, 0, id(font_header), "%s",
                    de ? "Feinstaub" : "Particulates");
          it.line(0, 13, 127, 13);

          auto label = [](int s) -> const char* {
            switch(s) {
              case 0: return "OK";
              case 1: return "OK";
              case 2: return "!";
              case 3: return "!!";
              case 4: return "!!!";
              default: return "";
            }
          };

          it.printf(0, 17, id(font_label), "PM1.0");
          if (id(sens_pm_1_0).has_state()) {
            it.printf(74, 17, id(font_label), TextAlign::TOP_RIGHT,
                      "%.0f", id(sens_pm_1_0).state);
            it.printf(77, 17, id(font_label), "\xC2\xB5g/m\xC2\xB3");
          } else {
            it.printf(74, 17, id(font_label), TextAlign::TOP_RIGHT, "--");
          }

          it.printf(0, 29, id(font_label), "PM2.5");
          if (id(sens_pm_2_5).has_state()) {
            it.printf(74, 29, id(font_label), TextAlign::TOP_RIGHT,
                      "%.0f", id(sens_pm_2_5).state);
            it.printf(77, 29, id(font_label), "\xC2\xB5g/m\xC2\xB3");
            if (id(aqi_pm25).has_state()) {
              it.printf(127, 29, id(font_label), TextAlign::TOP_RIGHT,
                        "%s", label((int)id(aqi_pm25).state));
            }
          } else {
            it.printf(74, 29, id(font_label), TextAlign::TOP_RIGHT, "--");
          }

          it.printf(0, 41, id(font_label), "PM10");
          if (id(sens_pm_10_0).has_state()) {
            it.printf(74, 41, id(font_label), TextAlign::TOP_RIGHT,
                      "%.0f", id(sens_pm_10_0).state);
            it.printf(77, 41, id(font_label), "\xC2\xB5g/m\xC2\xB3");
            if (id(aqi_pm10).has_state()) {
              it.printf(127, 41, id(font_label), TextAlign::TOP_RIGHT,
                        "%s", label((int)id(aqi_pm10).state));
            }
          } else {
            it.printf(74, 41, id(font_label), TextAlign::TOP_RIGHT, "--");
          }

          it.line(24, 53, 103, 53);

          if (id(dust_action).has_state()) {
            it.printf(64, 55, id(font_action), TextAlign::TOP_CENTER,
                      "%s", id(dust_action).state.c_str());
          }

      # Page 4: system status — clock, IP, SSID, RSSI.
      - id: page_system
        lambda: |-
          bool de = id(ui_language).state == "Deutsch";
          it.printf(0, 0, id(font_header), "System");
          it.line(0, 13, 127, 13);

          auto now = id(sntp_time).now();
          if (now.is_valid()) {
            it.strftime(0,   17, id(font_label), "%H:%M:%S", now);
            it.strftime(127, 17, id(font_label), TextAlign::TOP_RIGHT,
                        de ? "%d.%m.%Y" : "%Y-%m-%d", now);
          } else {
            it.printf(0, 17, id(font_label), "%s",
                      de ? "Zeit: sync..." : "Time: syncing...");
          }

          it.printf(0, 32, id(font_label), "IP");
          if (id(sys_ip).has_state()) {
            it.printf(127, 32, id(font_mono), TextAlign::TOP_RIGHT,
                      "%s", id(sys_ip).state.c_str());
          } else {
            it.printf(127, 32, id(font_mono), TextAlign::TOP_RIGHT, "--");
          }

          it.printf(0, 44, id(font_label), "SSID");
          if (id(sys_ssid).has_state()) {
            it.printf(127, 44, id(font_mono), TextAlign::TOP_RIGHT,
                      "%s", id(sys_ssid).state.c_str());
          } else {
            it.printf(127, 44, id(font_mono), TextAlign::TOP_RIGHT, "--");
          }

          it.printf(0, 54, id(font_label), "RSSI");
          if (id(sys_rssi).has_state()) {
            it.printf(127, 54, id(font_mono), TextAlign::TOP_RIGHT,
                      "%.0f dBm", id(sys_rssi).state);
          } else {
            it.printf(127, 54, id(font_mono), TextAlign::TOP_RIGHT, "--");
          }

# ---------------------------------------------------------------------
# Display rotation logic
# ---------------------------------------------------------------------
# When Wi-Fi is connected: rotate through the four data pages every 6s
# (page_overall -> page_climate -> page_pm -> page_system -> loop).
# When Wi-Fi is NOT connected (fresh device, factory reset, home Wi-Fi
# down): the setup page is pinned. Full cycle 4 x 6 s = 24 s.
#
# We do NOT use display.page.show_next: because that iterator walks
# ALL pages in YAML order — and page_setup is first in the list, so
# once per full lap the rotator would land on page_setup for 6 s
# even with Wi-Fi up. Instead we round-robin explicitly through
# only the four data pages by inspecting the currently-active page
# and picking the next one deterministically.
#
# Second interval below re-evaluates night mode every minute. Kept
# separate from the 6 s page-rotation loop so the two concerns don't
# get entangled: night mode is a state transition, page rotation is
# purely presentation.
# ---------------------------------------------------------------------
interval:
  - interval: 6s
    then:
      # Skip everything when the panel is off — no point cycling
      # invisible pages, and turn_off() disables the driver so an
      # update() would be a no-op anyway.
      - if:
          condition:
            lambda: 'return id(display_power).state && !id(night_active);'
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  # Home Wi-Fi is up — advance to the next data page,
                  # skipping page_setup entirely.
                  - lambda: |-
                      auto* cur = id(oled).get_active_page();
                      if      (cur == id(page_overall)) id(oled).show_page(id(page_climate));
                      else if (cur == id(page_climate)) id(oled).show_page(id(page_pm));
                      else if (cur == id(page_pm))      id(oled).show_page(id(page_system));
                      else                              id(oled).show_page(id(page_overall));
                else:
                  # No Wi-Fi — force the setup page and stay there.
                  - display.page.show: page_setup
            - component.update: oled

  # Night-mode heartbeat. The re-usable `reevaluate_night_mode` script
  # also runs on every switch/datetime change, so this interval is
  # only strictly needed for the wall-clock crossing the window edge.
  - interval: 60s
    then:
      - script.execute: reevaluate_night_mode
